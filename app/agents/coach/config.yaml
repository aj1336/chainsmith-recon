# app/agents/coach/config.yaml — tunables only (Phase 56 §5)
#
# `enabled` is the single source of truth for whether the coach is available
# (chat gates on registry membership). `parameters` holds the agent's own knobs,
# migrated out of ChainsmithConfig.coach in 56.10c. LLM model routing stays
# central in ChainsmithConfig.litellm.
#
# memory_cap is a CoachAgent constructor argument — from_spec forwards it.
# (The legacy context_window / max_recent_events knobs were never consumed and
# were dropped in 56.10c.)
# Legacy back-compat: CHAINSMITH_COACH_ENABLED toggles `enabled`,
# CHAINSMITH_COACH_MEMORY_CAP overrides memory_cap.

enabled: true
parameters:
  memory_cap: 10
