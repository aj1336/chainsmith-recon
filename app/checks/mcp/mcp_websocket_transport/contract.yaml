id: 12e133ff-a09c-4d54-a7ab-ed14b74570b1
name: mcp_websocket_transport
type: check
description: Discover MCP servers accessible via WebSocket transport
entry: check.py:WebSocketTransportCheck
suite: mcp
depends_on:
- output_name: mcp_servers
  operator: truthy
produces:
- mcp_websocket_servers
intrusive: false
service_types:
- ai
- api
- http
parallel_safe: false
outputs:
  observations:
  - Observation
side_effects:
- network
techniques:
- transport discovery
- protocol detection
- authentication bypass
references:
- MCP Specification - Transports - https://spec.modelcontextprotocol.io/specification/basic/transports/
- RFC 6455 - The WebSocket Protocol
reason: MCP may be accessible via WebSocket with different auth than HTTP endpoints
