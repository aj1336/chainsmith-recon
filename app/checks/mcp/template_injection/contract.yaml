id: 37e213eb-4e68-411c-819a-ab0a50ba022b
name: template_injection
type: check
description: Test MCP resource template parameters for injection
entry: check.py:ResourceTemplateInjectionCheck
suite: mcp
depends_on:
- output_name: mcp_servers
  operator: truthy
produces:
- mcp_template_injection_results
intrusive: true
service_types:
- ai
- api
- http
parallel_safe: false
outputs:
  observations:
  - Observation
side_effects:
- network
techniques:
- template injection
- parameter fuzzing
- input validation testing
references:
- MCP Specification - Resources - https://spec.modelcontextprotocol.io/specification/server/resources/
- CWE-89 SQL Injection
- CWE-22 Path Traversal
- CWE-78 OS Command Injection
reason: MCP resource templates with unsanitized parameters can lead to SQL injection,
  path traversal, or command injection
