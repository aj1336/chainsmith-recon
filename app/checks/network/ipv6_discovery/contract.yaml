id: d1a59618-ee81-42a8-9023-f1df8f22fb20
name: ipv6_discovery
type: check
description: IPv6 AAAA record resolution and dual-stack analysis
entry: check.py:IPv6DiscoveryCheck
suite: network
depends_on:
- output_name: target_hosts
  operator: truthy
produces:
- ipv6_data
intrusive: false
service_types: []
parallel_safe: false
outputs:
  observations:
  - Observation
side_effects:
- network
techniques:
- IPv6 discovery
- AAAA record resolution
- dual-stack analysis
references:
- PTES - Intelligence Gathering
- CWE-923 — Improper Restriction of Communication Channel to Intended Endpoints
- https://attack.mitre.org/techniques/T1590/004/
reason: Many targets have IPv6 endpoints with different security postures than IPv4.
  Firewalls and ACLs that restrict IPv4 access sometimes don't cover IPv6 equivalents.
  Services bound to 0.0.0.0 (all interfaces) are reachable on both stacks.
