id: 30d09c55-a4ef-4681-887a-430815b2b15e
name: network_whois_lookup
type: check
description: WHOIS domain registration and ASN lookup for resolved IPs
entry: check.py:WhoisLookupCheck
suite: network
depends_on:
- output_name: dns_records
  operator: truthy
produces:
- whois_data
intrusive: false
service_types: []
parallel_safe: false
outputs:
  observations:
  - Observation
side_effects:
- network
techniques:
- WHOIS lookup
- ASN enumeration
- domain registration analysis
- RDAP query
references:
- PTES - Intelligence Gathering
- https://attack.mitre.org/techniques/T1596/002/
- CWE-200 — Exposure of Sensitive Information
reason: WHOIS data reveals domain registration details (registrar, age, nameservers)
  and IP network ownership. Recently-registered domains hosting services may indicate
  phishing or shadow IT. ASN data complements GeoIP with network-level ownership context.
