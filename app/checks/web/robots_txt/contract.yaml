id: 162cb80e-2af0-4038-ae90-e4b2966062e2
name: robots_txt
type: check
description: Retrieve robots.txt and identify potentially sensitive paths
entry: check.py:RobotsTxtCheck
suite: web
depends_on:
- output_name: services
  operator: truthy
produces:
- robots_paths
intrusive: false
service_types:
- http
- html
- api
parallel_safe: false
outputs:
  observations:
  - Observation
side_effects:
- network
techniques:
- passive reconnaissance
- path discovery
references:
- OWASP WSTG-INFO-03
- RFC 9309
reason: robots.txt often reveals hidden paths that admins want to keep from search
  engines
