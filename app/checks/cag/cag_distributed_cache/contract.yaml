id: f4dac442-0706-43fd-8c38-b538bfb4d808
name: cag_distributed_cache
type: check
description: Detect multi-node cache topology and test replication consistency
entry: check.py:DistributedCacheCheck
suite: cag
depends_on:
- output_name: cag_endpoints
  operator: truthy
produces:
- distributed_cache_info
intrusive: true
service_types:
- ai
- api
- http
parallel_safe: false
outputs:
  observations:
  - Observation
side_effects:
- network
techniques:
- topology detection
- replication analysis
- node fingerprinting
references:
- https://portswigger.net/web-security/web-cache-poisoning
- OWASP LLM Top 10 - LLM06 Sensitive Information Disclosure
reason: Inconsistent cache replication means poisoning is harder to detect and only
  affects some users
